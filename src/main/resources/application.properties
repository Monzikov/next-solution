spring.application.name=next-solution
server.port=88

spring.ai.vectorstore.qdrant.host=${SPRING_AI_VECTORSTORE_QDRANT_HOST:localhost}
spring.ai.vectorstore.qdrant.port=${SPRING_AI_VECTORSTORE_QDRANT_PORT:6334}
spring.ai.vectorstore.qdrant.use-tls=${SPRING_AI_VECTORSTORE_QDRANT_USE_TLS:false}
spring.ai.vectorstore.qdrant.collection-name=${SPRING_AI_VECTORSTORE_QDRANT_COLLECTION_NAME:stop_list_collection}
app.qdrant.collection-name=${SPRING_AI_VECTORSTORE_QDRANT_COLLECTION_NAME:stop_list_collection}
app.qdrant.vector-size=768
app.qdrant.distance=Cosine

# BGE-M3 (вторая модель): коллекция, размерность и файлы модели/токенизатора
app.qdrant.bge-collection-name=${SPRING_AI_VECTORSTORE_QDRANT_BGE_COLLECTION_NAME:stop_list_collection_bge_m3}
app.qdrant.bge-vector-size=1024
app.bge.model-path=${APP_BGE_MODEL_PATH:inferences/bge_m3_model/bge_m3_model.onnx}
app.bge.tokenizer-path=${APP_BGE_TOKENIZER_PATH:inferences/bge_m3_model/tokenizer/tokenizer.json}