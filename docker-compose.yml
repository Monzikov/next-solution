services:
  next-solution:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: next-solution
    ports:
      - "88:88"
    environment:
      SERVER_PORT: 88
      SPRING_AI_VECTORSTORE_QDRANT_HOST: qdrant
      SPRING_AI_VECTORSTORE_QDRANT_PORT: 6334
      SPRING_AI_VECTORSTORE_QDRANT_USE_TLS: false
      SPRING_AI_VECTORSTORE_QDRANT_LABSE_COLLECTION_NAME: stop_list_collection
      SPRING_AI_VECTORSTORE_QDRANT_BGE_COLLECTION_NAME: stop_list_collection_bge_m3
    volumes:
      # Модели монтируются снаружи (в образ не пакуются). read-only — приложение их только читает.
      - ./inferences:/app/inferences:ro
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data: